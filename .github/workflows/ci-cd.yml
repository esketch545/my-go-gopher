name: Build, Push, and Trigger ArgoCD

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write
  issues: write
env:
  ACTIONS_STEP_DEBUG: true
  ACTIONS_RUNNER_DEBUG: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      DOCKER_IMAGE: ${{ secrets.DOCKER_IMAGE }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=sha-${{ github.sha }}
          docker build -t $DOCKER_IMAGE:$IMAGE_TAG .
          docker push $DOCKER_IMAGE:$IMAGE_TAG
        env:
          DOCKER_IMAGE: ${{ secrets.DOCKER_IMAGE }}

      - name: Clone gitops repo
        run: |
          git clone https://x-access-token:${{ secrets.GITOPS_WRITE_TOKEN }}@github.com/${{ vars.GITOPS_REPO }}.git gitops-repo

      - name: Update deployment YAML with new image and push changes to repository
        run: |
          GITOPS_DEPLOYMENT_MANIFEST_PATH=apps/${{ github.event.repository.name }}/deployment.yml
          IMAGE_TAG=sha-${{ github.sha }}
          
          sed -i gitops-repo "s|image:.*|image: $DOCKER_IMAGE:$IMAGE_TAG|g" $GITOPS_DEPLOYMENT_MANIFEST_PATH
      
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"
          
          git remote set-url origin https://github.com/${{ vars.GITOPS_REPO }}.git
          git add $GITOPS_DEPLOYMENT_MANIFEST_PATH
          git commit -m "Update image to $IMAGE_TAG [skip ci]" || echo "No changes to commit"
          
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ vars.GITOPS_REPO }} HEAD:main